name: Release L4 Plugin

on:
  push:
    branches: [main]
    paths:
      - ".claude/skills/writing-l4-rules/**"
      - ".claude-plugin/**"
      - "PLUGIN.md"
  workflow_dispatch:

jobs:
  release-plugin:
    name: Build and Release L4 Plugin
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0 # Get full history for versioning

      - name: Get version from commits
        id: version
        run: |
          # Count commits to skill and plugin manifest directories for versioning
          COMMIT_COUNT=$(git log --oneline -- .claude/skills/writing-l4-rules/ .claude-plugin/ skill/ l4/ | wc -l | tr -d ' ')
          # Get short hash of latest commit touching plugin directories
          SHORT_SHA=$(git log -1 --format=%h -- .claude/skills/writing-l4-rules/ .claude-plugin/ skill/ l4/)
          # Create version string
          VERSION="v0.1.${COMMIT_COUNT}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${VERSION}-${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "Release version will be: ${VERSION}-${SHORT_SHA}"

      - name: Update plugin version
        run: |
          # Update version in plugin.json
          VERSION="${{ steps.version.outputs.version }}"
          jq --arg ver "${VERSION#v}" '.version = $ver' .claude-plugin/plugin.json > .claude-plugin/plugin.json.tmp
          mv .claude-plugin/plugin.json.tmp .claude-plugin/plugin.json

          # Update version in marketplace.json
          jq --arg ver "${VERSION#v}" '
            .metadata.version = $ver |
            .plugins[0].version = $ver
          ' .claude-plugin/marketplace.json > .claude-plugin/marketplace.json.tmp
          mv .claude-plugin/marketplace.json.tmp .claude-plugin/marketplace.json

      - name: Create plugin packages
        run: |
          # Remove existing packages if present
          rm -f writing-l4-rules.skill l4-plugin.zip

          # Create skill-only package (for users who just want the SKILL.md + references)
          (
            cd .claude/skills/writing-l4-rules
            zip -r "$GITHUB_WORKSPACE/writing-l4-rules.skill" \
              assets/ \
              references/ \
              scripts/ \
              SKILL.md \
              -x "*.DS_Store" \
              -x "*/__pycache__/*" \
              -x "*/node_modules/.cache/*"
          )

          # Create full plugin package (includes .claude-plugin/ manifest + skill + PLUGIN.md)
          zip -r l4-plugin.zip \
            .claude-plugin/ \
            .claude/skills/writing-l4-rules/ \
            PLUGIN.md \
            -x "*.DS_Store" \
            -x "*/__pycache__/*" \
            -x "*/node_modules/.cache/*"

          # Verify packages
          echo "=== Skill Package ==="
          ls -lh writing-l4-rules.skill
          echo ""
          echo "=== Plugin Package ==="
          ls -lh l4-plugin.zip
          echo ""
          echo "Plugin package contents:"
          unzip -l l4-plugin.zip | head -30

      - name: Check if release exists
        id: check_release
        run: |
          if gh release view ${{ steps.version.outputs.tag }} >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Release ${{ steps.version.outputs.tag }} already exists"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Release ${{ steps.version.outputs.tag }} does not exist"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create GitHub Release
        if: steps.check_release.outputs.exists == 'false'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "L4 Computational Law Plugin ${{ steps.version.outputs.version }}"
          body: |
            ## L4 Computational Law Plugin for Claude Code

            This release contains the L4 plugin for Claude Code - a comprehensive tool for writing legal rules, contracts, and regulations as executable, verifiable code.

            ### Installation Methods

            **Via Marketplace (Recommended):**
            ```
            /plugin marketplace add legalese/l4-ide
            /plugin install l4-computational-law@legalese
            ```

            **Manual Plugin Installation:**
            1. Download `l4-plugin.zip`
            2. Extract to your plugins directory
            3. Restart Claude Code

            **Skill-Only Installation:**
            1. Download `writing-l4-rules.skill`
            2. Extract into `~/.claude/skills/writing-l4-rules/` or `<project>/.claude/skills/writing-l4-rules/`

            ### What's Included

            - **L4 authoring skill**: Expert guidance for formalising legal text as typed decision functions and regulative rules
            - **Reference documentation**: Deep dives on regulative rules, builtin libraries, and common gotchas
            - **Deploy to Legalese Cloud**: Annotate with `@export` / `@desc` and ship rules as REST, MCP, WebMCP, and OpenAPI endpoints

            ### Features

            - Formalise legal text as executable, type-checked rules
            - Obligations with deadlines and reparations (`MUST` / `HENCE` / `LEST` / `BREACH`)
            - One-click deployment to [Legalese Cloud](https://legalese.cloud) from the VS Code extension
            - Audit-grade execution traces for every decision

            ### Documentation

            See [PLUGIN.md](https://github.com/legalese/l4-ide/blob/main/PLUGIN.md) for complete documentation.

            ---

            **Version:** ${{ steps.version.outputs.version }}
            **Commit:** ${{ github.sha }}
            **Generated:** ${{ github.event.head_commit.timestamp }}
          files: |
            writing-l4-rules.skill
            l4-plugin.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update existing release
        if: steps.check_release.outputs.exists == 'true'
        run: |
          echo "Updating existing release ${{ steps.version.outputs.tag }}"
          gh release upload ${{ steps.version.outputs.tag }} writing-l4-rules.skill l4-plugin.zip --clobber
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Release summary
        run: |
          echo "## Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ steps.version.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Skill Package:** writing-l4-rules.skill ($(ls -lh writing-l4-rules.skill | awk '{print $5}'))" >> $GITHUB_STEP_SUMMARY
          echo "- **Plugin Package:** l4-plugin.zip ($(ls -lh l4-plugin.zip | awk '{print $5}'))" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Installation" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "/plugin marketplace add legalese/l4-ide" >> $GITHUB_STEP_SUMMARY
          echo "/plugin install l4-computational-law@legalese" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "View the release: ${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ steps.version.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
