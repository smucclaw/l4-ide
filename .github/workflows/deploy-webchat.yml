name: Deploy webchat to GitHub Pages

# Manual-only: does NOT run on push/PR-merge to main. Trigger from the Actions
# tab (Run workflow) when you want to publish the webchat SPA
# (ts-apps/webchat → chat.legalese.cloud, served via the static/CNAME custom
# domain). Pages "Source" must be set to "GitHub Actions" in repo settings.
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# GitHub Pages allows a single in-progress deployment at a time.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24.x"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build webchat
        run: npx turbo build --filter=webchat

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ts-apps/webchat/build

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
