# Merge-queue cache warm-up.
#
# Problem this solves: GitHub scopes cache READS to {the run's own ref, the
# repo default branch}, plus the base branch for pull_request events only.
# merge_group runs execute on an ephemeral gh-readonly-queue/... ref and get NO
# base-branch fallback — and our merge queue targets `unstable`, which is NOT
# the default branch (main is). So the fresh push-to-unstable Haskell cache is
# structurally invisible to every merge_group run, and each one cold-builds the
# cabal dependency store (~20 min) regardless of how recently unstable was
# built. (An earlier attempt to save the cache from merge_group itself, #100,
# failed for the same reason: each queue entry's ephemeral ref is a write-once
# scope no other run can read. It was reverted.)
#
# Fix: this workflow runs ON main (the default branch), so anything it saves
# lands in main's cache scope — the one scope merge_group CAN read. It checks
# out `unstable`, builds unstable's dependency set, and saves the cabal store
# under a dedicated `mq-warmup-` key prefix. pr-checks.yml adds that prefix as a
# restore-key ONLY on the merge_group path, so merge_group runs get a warm store
# while pull_request-into-main runs never match it (they keep restoring the
# `pr-checks-` namespace only) — main PRs are completely unaffected.
#
# This is a probe/first cut: it warms only the cabal STORE (the ~20 min pain),
# not dist-newstyle build artifacts. If it demonstrably lands merge_group cache
# hits, extend it to dist too.
name: Merge-queue cache warm-up

on:
  schedule:
    # Every 6h. Tune to unstable's dependency churn: more often = fresher warm
    # cache for merge_group, at the cost of one extra dependency build per run.
    - cron: "0 */6 * * *"
  workflow_dispatch: # manual trigger for the initial probe

# The scheduled run's ref is refs/heads/main (default branch), so the cache it
# saves is main-scoped and readable by merge_group. actions: write lets the
# prune step trim old mq-warmup-* entries so this doesn't grow the 10 GB cache.
permissions:
  contents: read
  actions: write

jobs:
  warm-haskell-cache:
    name: Warm merge-queue Haskell cache
    runs-on: ubuntu-latest
    container:
      image: ubuntu:24.04
    env:
      LC_ALL: C.UTF-8
      LANG: C.UTF-8

    steps:
      - name: Update repositories
        run: apt update
      - name: Install deps
        run: >
          apt install -y
          git
          sudo
          software-properties-common
          build-essential
          curl
          libffi-dev
          libffi8
          libgmp-dev
          libgmp10
          libncurses-dev
          pkg-config
          zlib1g-dev
          liblzma-dev
          xz-utils
      - name: Update git config
        run: git config --global --add safe.directory $GITHUB_WORKSPACE

      # Build UNSTABLE's dependency set: that's what merge_group-into-unstable
      # runs need. The cache SCOPE is still main (set by the run's ref, not by
      # what we check out), so the save stays readable by merge_group.
      - uses: actions/checkout@v5
        with:
          ref: unstable

      - name: Update git submodules
        run: git submodule update --init

      - name: Set up GHC
        uses: haskell-actions/setup@v2
        id: setup
        with:
          ghc-version: "9.10.2"
          cabal-version: "latest"
          cabal-update: true

      # Restore under the mq-warmup prefix so an unchanged dep set is a no-op:
      # we only rebuild (and re-save) when unstable's plan hash actually changes.
      - name: Restore warm cabal store
        uses: actions/cache/restore@v5
        id: warm-cache
        env:
          key: mq-warmup-${{ runner.os }}-ghc-${{ steps.setup.outputs.ghc-version }}-cabal-${{ steps.setup.outputs.cabal-version }}
        with:
          path: ${{ steps.setup.outputs.cabal-store }}
          key: ${{ env.key }}-plan-${{ hashFiles('**/*.cabal', 'cabal.project') }}
          restore-keys: ${{ env.key }}-

      - name: Configure the build
        run: |
          cabal update
          cabal configure --enable-tests --disable-documentation
          cabal build all --dry-run

      - name: Install dependencies
        if: steps.warm-cache.outputs.cache-hit != 'true'
        run: cabal build all --only-dependencies

      # Trim superseded mq-warmup-* entries BEFORE saving the fresh one, so this
      # family self-limits to a single entry and never pressures the 10 GB cap.
      # It matches ONLY the mq-warmup- prefix, so it can never touch the
      # pr-checks-* caches that PRs and pushes depend on.
      - name: Prune superseded warm caches
        if: steps.warm-cache.outputs.cache-hit != 'true'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const prefix = `mq-warmup-${{ runner.os }}-ghc-${{ steps.setup.outputs.ghc-version }}-cabal-`;
            const keep = '${{ steps.warm-cache.outputs.cache-primary-key }}';
            const caches = await github.paginate(
              github.rest.actions.getActionsCacheList,
              { owner: context.repo.owner, repo: context.repo.repo, per_page: 100 },
            );
            let freed = 0;
            for (const c of caches) {
              if (c.key.startsWith(prefix) && c.key !== keep) {
                core.info(`Deleting superseded warm cache ${c.key} (${Math.round(c.size_in_bytes / 1048576)} MB, ref ${c.ref})`);
                try {
                  await github.rest.actions.deleteActionsCacheById({
                    owner: context.repo.owner, repo: context.repo.repo, cache_id: c.id,
                  });
                  freed += c.size_in_bytes;
                } catch (e) {
                  core.warning(`  failed to delete ${c.key}: ${e.message}`);
                }
              }
            }
            core.info(`Freed ${Math.round(freed / 1048576)} MB before saving the fresh warm cache.`);

      - name: Save warm cabal store
        uses: actions/cache/save@v5
        if: steps.warm-cache.outputs.cache-hit != 'true'
        with:
          path: ${{ steps.setup.outputs.cabal-store }}
          key: ${{ steps.warm-cache.outputs.cache-primary-key }}
